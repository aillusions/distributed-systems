global:
  # Fast scrape so the graphs react quickly when a phase starts/stops.
  scrape_interval: 2s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # Host process metrics exported via OTLP HTTP/gRPC. The otel-collector
  # re-exposes them as a Prometheus scrape endpoint.
  - job_name: otel-collector
    static_configs:
      - targets: ['otel-collector:8889']
