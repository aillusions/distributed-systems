global:
  # Fast scrape so the graphs react quickly when a phase starts/stops.
  scrape_interval: 1s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # Broker / topic / partition / consumer-lag metrics off the cluster.
  - job_name: kafka-exporter
    static_configs:
      - targets: ['kafka-exporter:9308']

  # App-level metrics the TS driver exports via OTLP, re-exposed by the collector.
  - job_name: otel-collector
    static_configs:
      - targets: ['otel-collector:8889']
