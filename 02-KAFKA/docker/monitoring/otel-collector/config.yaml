receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s

exporters:
  prometheus:
    endpoint: '0.0.0.0:8889'
    add_metric_suffixes: false
    # Drop stale series fast so a finished experiment's line ends promptly
    # instead of holding its last value for several seconds past the phase.
    metric_expiration: 3s
    resource_to_telemetry_conversion:
      enabled: true

service:
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus]
