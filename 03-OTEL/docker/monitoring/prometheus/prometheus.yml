global:
  scrape_interval: 2s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # App metrics + spanmetrics, re-exposed by the collector. OpenMetrics is
  # negotiated automatically so exemplars come through with the samples.
  - job_name: otel-collector
    static_configs:
      - targets: ['otel-collector:8889']
